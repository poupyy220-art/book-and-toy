<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>寶貝玩具小幫手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── CSS 變數 ─────────────────────────────────────────── */
:root {
  --cream:      #FFF8F0;
  --cream-dark: #F5EDDF;
  --peach:      #FFCBA4;
  --peach-dark: #F5A87A;
  --sage:       #B8D8B0;
  --sage-dark:  #8CC084;
  --sky:        #A8D8EA;
  --sky-dark:   #6BBDD6;
  --lavender:   #C9B8E8;
  --lav-dark:   #A490D0;
  --coral:      #FF8A80;
  --coral-dark: #E85D50;
  --yellow:     #FFD97D;
  --text-main:  #3D2C1E;
  --text-mid:   #7A5C46;
  --text-soft:  #B08A72;
  --white:      #FFFFFF;
  --shadow-sm:  0 2px 8px rgba(61,44,30,.08);
  --shadow-md:  0 6px 24px rgba(61,44,30,.12);
  --shadow-lg:  0 16px 48px rgba(61,44,30,.16);
  --radius-sm:  12px;
  --radius-md:  20px;
  --radius-lg:  32px;
  --radius-xl:  48px;
}

/* ── Reset & Base ────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Nunito', 'Noto Sans TC', sans-serif;
  background: var(--cream);
  color: var(--text-main);
  overflow-x: hidden;
  /* 移除 height:100%，改用 min-height 讓 iPhone Safari 可以正常捲動 */
}

body {
  background-image:
    radial-gradient(circle at 15% 20%, rgba(255,203,164,.35) 0%, transparent 45%),
    radial-gradient(circle at 85% 75%, rgba(168,216,234,.30) 0%, transparent 45%),
    radial-gradient(circle at 50% 50%, rgba(201,184,232,.15) 0%, transparent 60%);
  min-height: 100vh;
}

/* ── 頁面切換容器 ──────────────────────────────────────── */
.screen {
  display: none;
  min-height: 100svh; /* svh = small viewport height，iPhone Safari 安全高度 */
  animation: fadeSlideIn .4s ease both;
}
.screen.active {
  display: flex; flex-direction: column;
  overflow-y: auto; /* 讓每個 screen 自己可以捲動 */
  -webkit-overflow-scrolling: touch;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Loading 全屏 ──────────────────────────────────────── */
#loading-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(255,248,240,.85);
  backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
#loading-overlay.show { display: flex; }

.loading-bear {
  font-size: 52px;
  animation: bounceBear 1s ease-in-out infinite;
}
@keyframes bounceBear {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-14px) rotate(5deg); }
}
.loading-text {
  font-size: 15px; font-weight: 700;
  color: var(--text-mid); letter-spacing: .04em;
}

/* ── Toast 通知 ────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
  z-index: 8888; pointer-events: none;
  background: var(--text-main); color: var(--white);
  padding: 12px 24px; border-radius: 100px;
  font-size: 14px; font-weight: 700;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ════════════════════════════════════════════════════════
   SCREEN 1 — 歡迎 / 首次設定
═══════════════════════════════════════════════════════ */
#screen-setup {
  align-items: center;
  /* 移除 justify-content:center，改用 padding 撐開，iPhone 才能捲動 */
  padding: 48px 24px 60px;
  text-align: center;
}

.setup-hero {
  margin-bottom: 32px;
  position: relative;
}

.hero-blob {
  width: 200px; height: 200px;
  background: linear-gradient(135deg, var(--peach) 0%, var(--yellow) 50%, var(--sage) 100%);
  border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
  margin: 0 auto 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
  animation: morphBlob 6s ease-in-out infinite, floatBlob 4s ease-in-out infinite;
  box-shadow: 0 20px 60px rgba(255,203,164,.5);
  position: relative;
}
.hero-blob::after {
  content: '';
  position: absolute; inset: -8px;
  border-radius: inherit;
  background: linear-gradient(135deg, var(--peach), var(--lavender));
  opacity: .25; z-index: -1;
  animation: morphBlob 6s ease-in-out infinite reverse;
}

@keyframes morphBlob {
  0%,100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
  25%     { border-radius: 45% 55% 40% 60% / 65% 35% 55% 45%; }
  50%     { border-radius: 55% 45% 55% 45% / 40% 60% 40% 60%; }
  75%     { border-radius: 35% 65% 45% 55% / 55% 45% 60% 40%; }
}
@keyframes floatBlob {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-12px); }
}

.hero-title {
  font-size: clamp(26px, 7vw, 36px);
  font-weight: 900; line-height: 1.2;
  color: var(--text-main);
  margin-bottom: 10px;
}
.hero-title span { color: var(--coral-dark); }

.hero-sub {
  font-size: 15px; color: var(--text-mid);
  font-weight: 600; line-height: 1.6;
}

/* 設定卡片 */
.setup-card {
  width: 100%; max-width: 420px;
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow-lg);
  position: relative; overflow: hidden;
}
.setup-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg, var(--peach), var(--yellow), var(--sage), var(--sky));
}

.card-label {
  font-size: 12px; font-weight: 800;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-soft); margin-bottom: 8px;
}

.input-wrap {
  position: relative; margin-bottom: 20px;
}
.input-emoji {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 22px; pointer-events: none;
}
.text-input {
  width: 100%; padding: 16px 16px 16px 52px;
  border: 2.5px solid var(--cream-dark);
  border-radius: var(--radius-md);
  font-size: 17px; font-weight: 700;
  font-family: inherit;
  color: var(--text-main);
  background: var(--cream);
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.text-input:focus {
  border-color: var(--peach-dark);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(245,168,122,.15);
}
.text-input::placeholder { color: var(--text-soft); font-weight: 600; }

.age-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; margin-bottom: 24px;
}
.age-chip {
  padding: 10px 4px; border-radius: var(--radius-sm);
  border: 2.5px solid var(--cream-dark);
  background: var(--cream); color: var(--text-mid);
  font-size: 13px; font-weight: 800; font-family: inherit;
  cursor: pointer; text-align: center;
  transition: all .2s;
}
.age-chip:hover   { border-color: var(--peach); background: rgba(255,203,164,.15); }
.age-chip.selected {
  border-color: var(--peach-dark); background: var(--peach);
  color: var(--text-main);
  box-shadow: 0 4px 12px rgba(245,168,122,.3);
}

/* 出生日期選擇器 */
.dob-row {
  display: flex; align-items: flex-end; gap: 6px;
  margin-bottom: 16px;
}
.dob-field { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.dob-label {
  font-size: 11px; font-weight: 800; color: var(--text-soft);
  text-align: center; letter-spacing: .05em;
}
.dob-select {
  width: 100%; padding: 13px 8px;
  border: 2.5px solid var(--cream-dark);
  border-radius: var(--radius-md);
  font-size: 15px; font-weight: 700;
  font-family: inherit; color: var(--text-main);
  background: var(--cream);
  outline: none; text-align: center;
  cursor: pointer;
  -webkit-appearance: none; appearance: none;
  transition: border-color .2s, box-shadow .2s;
}
.dob-select:focus {
  border-color: var(--peach-dark);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(245,168,122,.15);
}
.dob-select option[value=""] { color: var(--text-soft); }
.dob-sep {
  font-size: 20px; font-weight: 900; color: var(--text-soft);
  padding-bottom: 10px; flex-shrink: 0;
}

/* 月齡即時顯示 */
.age-preview {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, rgba(255,203,164,.25), rgba(201,184,232,.2));
  border: 2px solid rgba(245,168,122,.3);
  border-radius: var(--radius-md);
  padding: 13px 18px; margin-bottom: 20px;
  animation: fadeSlideIn .3s ease;
}
.age-preview-emoji { font-size: 22px; }
.age-preview-text  {
  font-size: 15px; font-weight: 800; color: var(--text-main);
  line-height: 1.4;
}
.age-preview-text em {
  font-style: normal; color: var(--coral-dark);
}

.btn-primary {
  width: 100%; padding: 18px;
  background: linear-gradient(135deg, var(--peach-dark), var(--coral));
  border: none; border-radius: var(--radius-md);
  color: var(--white); font-size: 17px; font-weight: 900;
  font-family: inherit; cursor: pointer;
  box-shadow: 0 8px 24px rgba(245,168,122,.4);
  transition: transform .2s, box-shadow .2s;
  letter-spacing: .02em;
}
.btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(245,168,122,.5); }
.btn-primary:active { transform: translateY(0); box-shadow: 0 4px 16px rgba(245,168,122,.3); }

/* ════════════════════════════════════════════════════════
   SCREEN 2 — 主畫面
═══════════════════════════════════════════════════════ */
#screen-main {
  flex-direction: column;
  max-width: 680px; margin: 0 auto;
  width: 100%;
}

/* 頂部 Header */
.main-header {
  padding: 20px 24px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,248,240,.85);
  backdrop-filter: blur(16px);
  border-bottom: 1.5px solid rgba(245,168,122,.15);
}
.header-left { display: flex; align-items: center; gap: 12px; }

.avatar-ring {
  width: 46px; height: 46px;
  background: linear-gradient(135deg, var(--peach), var(--lavender));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 12px rgba(255,203,164,.4);
}
.header-greeting { font-size: 12px; color: var(--text-soft); font-weight: 700; }
.header-name     { font-size: 17px; font-weight: 900; color: var(--text-main); }

.btn-icon {
  width: 42px; height: 42px;
  background: var(--white); border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform .2s, box-shadow .2s;
}
.btn-icon:hover { transform: scale(1.08); box-shadow: var(--shadow-md); }

/* 統計卡片列 */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; padding: 20px 24px 8px;
}
.stat-card {
  background: var(--white);
  border-radius: var(--radius-md);
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: transform .2s;
}
.stat-card:hover { transform: translateY(-3px); }
.stat-num  { font-size: 26px; font-weight: 900; line-height: 1; }
.stat-label{ font-size: 11px; font-weight: 700; color: var(--text-soft); margin-top: 4px; }
.stat-card.green .stat-num  { color: var(--sage-dark); }
.stat-card.yellow .stat-num { color: #D4A017; }
.stat-card.red .stat-num    { color: var(--coral-dark); }

/* 快速新增按鈕 */
.fab-wrap {
  padding: 16px 24px;
}
.fab-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--coral) 0%, var(--peach-dark) 100%);
  border: none; border-radius: var(--radius-md);
  padding: 18px 24px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  color: var(--white); font-size: 16px; font-weight: 900;
  font-family: inherit; cursor: pointer;
  box-shadow: 0 8px 28px rgba(255,138,128,.38);
  transition: transform .2s, box-shadow .2s;
}
.fab-btn:hover  { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(255,138,128,.48); }
.fab-btn:active { transform: scale(.98); }
.fab-icon { font-size: 22px; }

/* Section 標題 */
.section-header {
  padding: 8px 24px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-title {
  font-size: 16px; font-weight: 900; color: var(--text-main);
  display: flex; align-items: center; gap: 8px;
}
.section-count {
  font-size: 12px; font-weight: 700; color: var(--text-soft);
  background: var(--cream-dark);
  padding: 3px 10px; border-radius: 100px;
}

/* Filter 標籤列 */
.filter-row {
  display: flex; gap: 8px;
  padding: 0 24px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-chip {
  flex-shrink: 0;
  padding: 8px 16px; border-radius: 100px;
  border: 2px solid var(--cream-dark);
  background: var(--white); color: var(--text-mid);
  font-size: 13px; font-weight: 800; font-family: inherit;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.filter-chip:hover   { border-color: var(--sky-dark); }
.filter-chip.active  {
  background: var(--text-main); border-color: var(--text-main);
  color: var(--white); box-shadow: 0 4px 12px rgba(61,44,30,.2);
}

/* 物品卡片列表 */
.items-list {
  padding: 0 24px 100px;
  display: flex; flex-direction: column; gap: 12px;
}

.item-card {
  background: var(--white);
  border-radius: var(--radius-md);
  padding: 18px;
  display: flex; align-items: flex-start; gap: 14px;
  box-shadow: var(--shadow-sm);
  transition: transform .2s, box-shadow .2s;
  cursor: pointer;
  animation: cardIn .35s ease both;
  border-left: 4px solid transparent;
}
.item-card:hover { transform: translateX(4px); box-shadow: var(--shadow-md); }
.item-card.safe     { border-left-color: var(--sage-dark); }
.item-card.caution  { border-left-color: var(--yellow); }
.item-card.unsafe   { border-left-color: var(--coral-dark); }

@keyframes cardIn {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}

.card-emoji-wrap {
  width: 52px; height: 52px; flex-shrink: 0;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
}
.item-card.safe    .card-emoji-wrap { background: rgba(184,216,176,.3); }
.item-card.caution .card-emoji-wrap { background: rgba(255,217,125,.3); }
.item-card.unsafe  .card-emoji-wrap { background: rgba(255,138,128,.2); }

.card-body { flex: 1; min-width: 0; }
.card-name {
  font-size: 15px; font-weight: 800; color: var(--text-main);
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-result {
  font-size: 13px; color: var(--text-mid); font-weight: 600;
  line-height: 1.5; margin-bottom: 6px;
}
.card-meta {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.badge {
  font-size: 11px; font-weight: 800; padding: 3px 10px;
  border-radius: 100px; letter-spacing: .02em;
}
.badge.toy     { background: rgba(168,216,234,.35); color: var(--sky-dark); }
.badge.book    { background: rgba(201,184,232,.35); color: var(--lav-dark); }
.badge.safe    { background: rgba(184,216,176,.35); color: var(--sage-dark); }
.badge.caution { background: rgba(255,217,125,.35); color: #B8860B; }
.badge.unsafe  { background: rgba(255,138,128,.25); color: var(--coral-dark); }
.card-date { font-size: 11px; color: var(--text-soft); font-weight: 600; }

/* 空狀態 */
.empty-state {
  padding: 60px 24px;
  text-align: center;
}
.empty-emoji { font-size: 64px; margin-bottom: 16px; animation: floatBlob 3s ease-in-out infinite; }
.empty-title { font-size: 18px; font-weight: 900; color: var(--text-main); margin-bottom: 8px; }
.empty-sub   { font-size: 14px; color: var(--text-soft); font-weight: 600; line-height: 1.6; }

/* ════════════════════════════════════════════════════════
   SCREEN 3 — 新增物品（Modal 式全屏）
═══════════════════════════════════════════════════════ */
#screen-add {
  flex-direction: column;
  max-width: 680px; margin: 0 auto; width: 100%;
}

.add-header {
  padding: 20px 24px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 1.5px solid rgba(245,168,122,.15);
}
.btn-back {
  width: 40px; height: 40px;
  background: var(--cream-dark); border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
  transition: transform .2s;
}
.btn-back:hover { transform: scale(1.1); }
.add-title { font-size: 20px; font-weight: 900; }

.add-body {
  flex: 1; overflow-y: auto;
  padding: 24px 24px 32px;
  display: flex; flex-direction: column; gap: 24px;
}

.form-group { display: flex; flex-direction: column; gap: 8px; }

.form-label {
  font-size: 12px; font-weight: 800;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-soft);
  display: flex; align-items: center; gap: 6px;
}

.type-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.type-card {
  padding: 20px 16px;
  border: 2.5px solid var(--cream-dark);
  border-radius: var(--radius-md);
  background: var(--cream); cursor: pointer;
  text-align: center; transition: all .2s;
}
.type-card:hover { border-color: var(--peach); }
.type-card.selected.toy  { border-color: var(--sky-dark); background: rgba(168,216,234,.18); }
.type-card.selected.book { border-color: var(--lav-dark); background: rgba(201,184,232,.18); }
.type-card-emoji { font-size: 36px; margin-bottom: 8px; }
.type-card-label { font-size: 14px; font-weight: 800; color: var(--text-main); }

.age-input {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}

/* AI 分析結果區塊 */
.ai-result-box {
  background: linear-gradient(135deg, rgba(255,248,240,1), rgba(201,184,232,.15));
  border: 2px solid rgba(201,184,232,.4);
  border-radius: var(--radius-md);
  padding: 20px;
  display: none;
  animation: fadeSlideIn .4s ease;
}
.ai-result-box.show { display: block; }

.ai-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.ai-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--lav-dark);
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .5; transform: scale(1.4); }
}
.ai-label { font-size: 12px; font-weight: 800; color: var(--lav-dark); letter-spacing: .08em; }

.verdict-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.verdict-badge {
  padding: 6px 16px; border-radius: 100px;
  font-size: 14px; font-weight: 900;
}
.verdict-badge.safe    { background: var(--sage);    color: #2D6A4F; }
.verdict-badge.caution { background: var(--yellow);  color: #7D5A00; }
.verdict-badge.unsafe  { background: var(--coral);   color: #7D1F1F; }
.verdict-score { font-size: 28px; font-weight: 900; }

.ai-text {
  font-size: 14px; color: var(--text-mid);
  font-weight: 600; line-height: 1.7;
}

.concern-list {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
}
.concern-tag {
  font-size: 12px; font-weight: 700;
  padding: 4px 12px; border-radius: 100px;
  background: rgba(245,168,122,.2); color: var(--text-mid);
}
/* 導讀 tip 區塊 */
.ai-tip {
  width: 100%; margin-top: 10px;
  background: rgba(168,216,234,.2);
  border-left: 3px solid var(--sky-dark);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 10px 14px;
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; font-weight: 600; color: var(--text-mid);
  line-height: 1.6;
}
.ai-tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

.btn-analyze {
  width: 100%; padding: 18px;
  background: linear-gradient(135deg, var(--lav-dark), var(--sky-dark));
  border: none; border-radius: var(--radius-md);

<!-- ════════════════════════════════════════════════
  JavaScript
═══════════════════════════════════════════════════ -->
<script>
// ── 設定 ──────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
// ⚠️ 替換成你的 GAS Web App URL

const LS_CHILD_ID  = 'toy_child_id';
const LS_TOKEN     = 'toy_token';
const LS_NAME      = 'toy_child_name';
const LS_AGE       = 'toy_child_age';
const LS_ITEMS_KEY = 'toy_items_cache'; // 本地快取

// ── 狀態 ──────────────────────────────────────────
let state = {
  childId:     null,
  token:       null,
  childName:   null,
  childDob:    null,  // "YYYY-MM-DD"
  childAge:    null,  // calcAge() 物件
  items:       [],
  currentItem: null,
  filter:      'all',
  aiResult:    null,
  selectedType: null,
  selectedAge:  [],
};

// ── UI 工具 ───────────────────────────────────────

/** 切換畫面 */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
  window.scrollTo(0, 0);
}

/** 顯示 loading */
function setLoading(show) {
  document.getElementById('loading-overlay').classList.toggle('show', show);
}

/** Toast 通知 */
function showToast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

/** 日期格式化 */
function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/** XSS 防護 */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 身份管理 ──────────────────────────────────────

function loadIdentity() {
  state.childId   = localStorage.getItem(LS_CHILD_ID);
  state.token     = localStorage.getItem(LS_TOKEN);
  state.childName = localStorage.getItem(LS_NAME);
  state.childDob  = localStorage.getItem('toy_child_dob') || null;
  state.childAge  = state.childDob ? calcAge(state.childDob) : null;
}

function saveIdentity(childId, token, name, dob) {
  localStorage.setItem(LS_CHILD_ID, childId);
  localStorage.setItem(LS_TOKEN,    token);
  localStorage.setItem(LS_NAME,     name);
  if (dob) localStorage.setItem('toy_child_dob', dob);
  state.childId   = childId; state.token = token;
  state.childName = name;
  state.childDob  = dob || null;
  state.childAge  = dob ? calcAge(dob) : null;
}

// ── 本地快取（離線優先）──────────────────────────

function cacheItems(items) {
  localStorage.setItem(LS_ITEMS_KEY, JSON.stringify(items));
}

function getCachedItems() {
  try { return JSON.parse(localStorage.getItem(LS_ITEMS_KEY) || '[]'); }
  catch { return []; }
}

// ── API 呼叫 ──────────────────────────────────────

async function callAPI(payload) {
  try {
    const res = await fetch(API_URL, {
      method:  'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.warn('[API]', err.message);
    return { success: false, error: err.message };
  }
}

// ── 業務函式 ──────────────────────────────────────

async function createChild(name, age) {
  setLoading(true);
  const result = await callAPI({ action: 'create_child', child_name: name });
  setLoading(false);

  if (result.success) {
    saveIdentity(result.child_id, result.token, result.child_name, age);
    showToast(`歡迎！${result.child_name} 的資料已建立 🎉`);
    return true;
  } else {
    // Demo 模式：若 API 不通則使用本地模擬
    const fakeId = 'c_' + Math.random().toString(36).slice(2, 10);
    const fakeTk = Math.random().toString(36).repeat(3).slice(0, 48);
    saveIdentity(fakeId, fakeTk, name, age);
    showToast(`歡迎！${name} 的資料已建立（Demo 模式）🎉`);
    return true;
  }
}

async function fetchItems() {
  if (!state.childId || !state.token) return;

  const result = await callAPI({
    action:   'get_items',
    child_id: state.childId,
    token:    state.token
  });

  if (result.success) {
    state.items = result.items;
    cacheItems(state.items);
  } else {
    // 使用本地快取
    state.items = getCachedItems();
  }
  renderItemsList();
  updateStats();
}

async function saveItem() {
  if (!state.aiResult) return;
  const name  = document.getElementById('input-item-name').value.trim();
  const note  = document.getElementById('input-item-note').value.trim();

  setLoading(true);
  const result = await callAPI({
    action:    'add_item',
    child_id:  state.childId,
    token:     state.token,
    item_name: name,
    category:  state.selectedType || 'toy',
    ai_result: JSON.stringify(state.aiResult),
    note:      note
  });
  setLoading(false);

  // 不論 API 是否成功，本地先加入（樂觀更新）
  const newItem = {
    item_id:    result.item_id || 'local_' + Date.now(),
    child_id:   state.childId,
    item_name:  name,
    category:   state.selectedType || 'toy',
    ai_result:  JSON.stringify(state.aiResult),
    note:       note,
    created_at: new Date().toISOString()
  };
  state.items.unshift(newItem);
  cacheItems(state.items);

  showToast('判斷記錄已儲存！✅');
  showScreen('screen-main');
  renderItemsList();
  updateStats();
  resetAddForm();
}

// ── AI 判斷（呼叫 Claude API）────────────────────

async function analyzeItem() {
  const name = document.getElementById('input-item-name').value.trim();
  if (!name) { showToast('請輸入玩具或繪本名稱 📝'); return; }

  const type = state.selectedType || 'toy';
  const ages = state.selectedAge.join(', ') || '未指定';

  // 精確月齡：每次分析都即時重算（避免長時間停留頁面月齡過期）
  const ageInfo = state.childDob ? calcAge(state.childDob) : null;
  const ageStr  = ageInfo
    ? `${ageInfo.label}（共 ${ageInfo.totalMonths} 個月，發展階段：${ageInfo.desc}）`
    : (state.childAge || '未指定');

  setLoading(true);
  document.getElementById('btn-analyze').disabled = true;

  try {
    const prompt = `
你是幼兒玩具與繪本安全評估專家，同時熟悉兒童發展心理學。

請依據以下精確月齡，判斷玩具/繪本的安全性與發展適切性，並回傳嚴格 JSON（不含任何 markdown）：

物品名稱：${name}
類型：${type === 'toy' ? '玩具' : '繪本'}
包裝標示適用年齡：${ages}
寶貝實際月齡：${ageStr}

評估重點（依月齡調整）：
- 0-6M：感官刺激、窒息風險、BPA/毒素、噪音分貝
- 6-12M：抓握安全、站立穩定、咬食安全、爬行障礙
- 1-2Y：小零件（<3.2cm）、尖角、繩索纏繞、語言啟蒙
- 2-3Y：想像力發展、情緒主題適切性、創意材料安全
- 3Y+：社交技能培養、認知挑戰程度、競爭心理影響

回傳格式（純 JSON，無多餘文字）：
{
  "verdict": "safe" | "caution" | "unsafe",
  "score": "⭐⭐⭐⭐⭐（如 ⭐⭐⭐）",
  "summary": "針對該月齡的一句話總結（20字內）",
  "detail": "詳細說明，包含月齡適切性分析（120字內）",
  "ageMatch": "完全符合" | "略低" | "略高" | "不符合",
  "concerns": ["具體注意事項1","具體注意事項2"]（最多3項，無則空陣列）,
  "tip": "給爸媽的導讀或互動建議（50字內）",
  "emoji": "最符合的單一 emoji"
}
`.trim();

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:      'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages:   [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.map(c => c.text || '').join('') || '';
    const clean   = text.replace(/```json|```/g, '').trim();
    const aiData  = JSON.parse(clean);
    state.aiResult = aiData;
    renderAIResult(aiData);

  } catch (err) {
    // Fallback Demo 結果
    const demo = {
      verdict:  'caution',
      score:    '⭐⭐⭐',
      summary:  '需要大人陪同使用',
      detail:   `「${name}」整體適合幼兒，但建議在大人陪同下使用。注意小零件是否容易脫落，以及材質是否通過安全認證。`,
      concerns: ['確認無小零件', '確認材質安全認證', '大人陪同使用'],
      emoji:    '⚠️'
    };
    state.aiResult = demo;
    renderAIResult(demo);
    showToast('使用 Demo 模式（API 未連接）');
  }

  document.getElementById('btn-analyze').disabled = false;
  setLoading(false);
}

function renderAIResult(ai) {
  const box     = document.getElementById('ai-result-box');
  const badge   = document.getElementById('verdict-badge');
  const score   = document.getElementById('verdict-score');
  const text    = document.getElementById('ai-text-content');
  const concerns= document.getElementById('concern-list');
  const saveBtn = document.getElementById('btn-save-item');

  const verdictMap = { safe: '✅ 安全', caution: '⚠️ 注意', unsafe: '🚫 不適合' };
  badge.textContent = verdictMap[ai.verdict] || ai.verdict;
  badge.className   = `verdict-badge ${ai.verdict}`;
  score.textContent = ai.score;
  text.textContent  = ai.detail;

  // 月齡符合度標籤
  const ageMatchMap = {
    '完全符合': { cls: 'safe',    icon: '🎯' },
    '略低':     { cls: 'caution', icon: '📉' },
    '略高':     { cls: 'caution', icon: '📈' },
    '不符合':   { cls: 'unsafe',  icon: '⛔' },
  };
  const matchInfo  = ageMatchMap[ai.ageMatch] || { cls: '', icon: '❓' };
  const ageMatchEl = ai.ageMatch
    ? `<span class="concern-tag" style="background:var(--cream-dark)">${matchInfo.icon} 月齡${ai.ageMatch}</span>`
    : '';

  // 導讀 / 互動 tip
  const tipEl = ai.tip
    ? `<div class="ai-tip"><span class="ai-tip-icon">💡</span><span>${ai.tip}</span></div>`
    : '';

  concerns.innerHTML =
    ageMatchEl +
    (ai.concerns || []).map(c => `<span class="concern-tag">• ${esc(c)}</span>`).join('') +
    tipEl;

  box.classList.add('show');
  saveBtn.classList.add('show');
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 主畫面渲染 ────────────────────────────────────

function renderItemsList() {
  const container = document.getElementById('items-list');
  const filter    = state.filter;

  let items = [...state.items];

  // 篩選
  if (filter !== 'all') {
    items = items.filter(item => {
      const ai = safeParseAI(item.ai_result);
      if (filter === 'safe')    return ai?.verdict === 'safe';
      if (filter === 'caution') return ai?.verdict === 'caution';
      if (filter === 'unsafe')  return ai?.verdict === 'unsafe';
      if (filter === 'toy')     return item.category === 'toy';
      if (filter === 'book')    return item.category === 'book';
      return true;
    });
  }

  document.getElementById('items-count').textContent = `${state.items.length} 筆`;

  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">🔍</div>
        <div class="empty-title">${state.items.length === 0 ? '還沒有記錄' : '篩選結果為空'}</div>
        <div class="empty-sub">${state.items.length === 0
          ? '點上方按鈕掃描第一個玩具吧！'
          : '換個篩選條件試試看'}</div>
      </div>`;
    return;
  }

  container.innerHTML = items.map((item, idx) => {
    const ai       = safeParseAI(item.ai_result);
    const verdict  = ai?.verdict || 'caution';
    const emoji    = ai?.emoji || (item.category === 'book' ? '📚' : '🧸');
    const catLabel = item.category === 'book' ? '繪本' : '玩具';
    const summary  = ai?.summary || item.ai_result || '-';

    return `
      <div class="item-card ${verdict}" style="animation-delay:${idx * 50}ms"
           onclick="openDetail(${idx}, '${esc(JSON.stringify(item).replace(/'/g,"&#39;"))}')">
        <div class="card-emoji-wrap">${emoji}</div>
        <div class="card-body">
          <div class="card-name">${esc(item.item_name)}</div>
          <div class="card-result">${esc(summary)}</div>
          <div class="card-meta">
            <span class="badge ${item.category}">${catLabel}</span>
            <span class="badge ${verdict}">${verdict === 'safe' ? '安全' : verdict === 'caution' ? '注意' : '不適合'}</span>
            <span class="card-date">${fmtDate(item.created_at)}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function updateStats() {
  let safe = 0, caution = 0, unsafe = 0;
  state.items.forEach(item => {
    const ai = safeParseAI(item.ai_result);
    if (ai?.verdict === 'safe')   safe++;
    else if (ai?.verdict === 'caution') caution++;
    else if (ai?.verdict === 'unsafe')  unsafe++;
  });
  document.getElementById('stat-safe').textContent    = safe;
  document.getElementById('stat-caution').textContent = caution;
  document.getElementById('stat-unsafe').textContent  = unsafe;
}

function safeParseAI(val) {
  if (!val) return null;
  if (typeof val === 'object') return val;
  try { return JSON.parse(val); } catch { return null; }
}

// ── 詳細頁 ────────────────────────────────────────

function openDetail(idx, itemJson) {
  try {
    const item = JSON.parse(itemJson.replace(/&#39;/g, "'"));
    state.currentItem = item;
    const ai       = safeParseAI(item.ai_result);
    const verdict  = ai?.verdict || 'caution';
    const emoji    = ai?.emoji   || (item.category === 'book' ? '📚' : '🧸');
    const catLabel = item.category === 'book' ? '繪本' : '玩具';
    const verdictTxt = { safe: '✅ 安全', caution: '⚠️ 注意', unsafe: '🚫 不適合' };

    document.getElementById('detail-emoji').textContent = emoji;
    document.getElementById('detail-name').textContent  = item.item_name;
    document.getElementById('detail-score').textContent = ai?.score || '-';
    document.getElementById('detail-ai-text').textContent = ai?.detail || item.ai_result || '-';

    const badge = document.getElementById('detail-verdict-badge');
    badge.textContent = verdictTxt[verdict] || verdict;
    badge.className   = `verdict-badge ${verdict}`;

    document.getElementById('detail-badges').innerHTML = `
      <span class="badge ${item.category}">${catLabel}</span>
      <span class="badge ${verdict}">${verdictTxt[verdict] || verdict}</span>`;

    document.getElementById('detail-concern-list').innerHTML =
      (ai?.concerns || []).map(c => `<span class="concern-tag">• ${esc(c)}</span>`).join('');

    document.getElementById('detail-info').innerHTML = `
      <div>📅 判斷時間：${fmtDate(item.created_at)}</div>
      ${item.note ? `<div>💬 備註：${esc(item.note)}</div>` : ''}
    `;

    showScreen('screen-detail');
  } catch (e) {
    showToast('無法開啟詳情');
  }
}

// ── 表單重設 ──────────────────────────────────────

function resetAddForm() {
  document.getElementById('input-item-name').value = '';
  document.getElementById('input-item-note').value  = '';
  document.querySelectorAll('#add-age-grid .age-chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('ai-result-box').classList.remove('show');
  document.getElementById('btn-save-item').classList.remove('show');
  document.getElementById('btn-analyze').disabled = false;
  state.aiResult     = null;
  state.selectedType = null;

}

// ── 初始化 ────────────────────────────────────────

function initMain() {
  document.getElementById('main-child-name').textContent = state.childName || '寶貝';

  // 即時更新月齡（每次進入主畫面都重算）
  if (state.childDob) {
    state.childAge = calcAge(state.childDob);
    const ageLabel = state.childAge ? state.childAge.label : '';
    document.getElementById('header-greeting').textContent =
      ageLabel ? `${ageLabel} · 今天也一起守護寶貝！` : '今天也一起守護寶貝！';
  }

  // 依名稱決定頭像 emoji
  const avatars = ['🐰','🐻','🐼','🦊','🐸','🦁','🐨','🐮'];
  const idx = (state.childName || '').charCodeAt(0) % avatars.length;
  document.getElementById('main-avatar').textContent = avatars[idx];

  // 先顯示快取
  state.items = getCachedItems();
  renderItemsList();
  updateStats();

  // 再拉取遠端
  fetchItems();
}

async function init() {
  loadIdentity();

  if (state.childId && state.token) {
    showScreen('screen-main');
    initMain();
  } else {
    showScreen('screen-setup');
  }
}

// ── 出生日期工具函式 ─────────────────────────────

/**
 * 計算精確月齡與描述
 * @param {string} dob  - "YYYY-MM-DD"
 * @returns {{ totalMonths: number, label: string, desc: string }}
 */
function calcAge(dob) {
  if (!dob) return null;
  const birth = new Date(dob);
  const now   = new Date();
  if (isNaN(birth.getTime()) || birth > now) return null;

  let years  = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth()    - birth.getMonth();
  let days   = now.getDate()     - birth.getDate();

  if (days   < 0) { months--; }
  if (months < 0) { months += 12; years--; }

  const totalMonths = years * 12 + months;

  let label, desc;
  if (totalMonths < 1) {
    const d = Math.floor((now - birth) / 86400000);
    label = `${d} 天`;
    desc  = `新生兒`;
  } else if (totalMonths < 12) {
    label = `${totalMonths} 個月`;
    desc  = totalMonths < 6 ? '嬰兒期（0-6M）' : '嬰兒期（6-12M）';
  } else if (totalMonths < 24) {
    label = `1 歲 ${months} 個月`;
    desc  = '學步期（1-2Y）';
  } else {
    const y = Math.floor(totalMonths / 12);
    const m = totalMonths % 12;
    label = m > 0 ? `${y} 歲 ${m} 個月` : `${y} 歲`;
    desc  = `幼兒期（${y}Y）`;
  }

  return { totalMonths, label, desc };
}

/** 初始化年份下拉（今年往前 8 年）*/
function initDobSelects() {
  const yearSel = document.getElementById('dob-year');
  const daySel  = document.getElementById('dob-day');
  const now     = new Date();

  yearSel.innerHTML = '<option value="">年</option>';
  for (let y = now.getFullYear(); y >= now.getFullYear() - 8; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = `${y} 年`;
    yearSel.appendChild(opt);
  }

  daySel.innerHTML = '<option value="">日</option>';
  for (let d = 1; d <= 31; d++) {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = `${d} 日`;
    daySel.appendChild(opt);
  }
}

/** 更新月齡預覽 + 同步 state.childDob / childAge */
function onDobChange() {
  const y = document.getElementById('dob-year').value;
  const m = document.getElementById('dob-month').value;
  const d = document.getElementById('dob-day').value;

  const preview = document.getElementById('age-preview');
  const preText = document.getElementById('age-preview-text');

  if (!y || !m || !d) { preview.style.display = 'none'; return; }

  // 補零確保 date string 合法
  const dob = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const age = calcAge(dob);

  if (!age) { preview.style.display = 'none'; return; }

  state.childDob = dob;
  state.childAge = age;   // 物件，取代舊字串

  localStorage.setItem('toy_child_dob', dob);

  preText.innerHTML = `現在 <em>${age.label}</em>　${age.desc}`;
  preview.style.display = 'flex';
}

// ── 事件綁定 ──────────────────────────────────────

// 設定頁：初始化並綁定出生日期
initDobSelects();
['dob-year','dob-month','dob-day'].forEach(id => {
  document.getElementById(id).addEventListener('change', onDobChange);
});

// 設定頁：建立 child
document.getElementById('btn-create-child').addEventListener('click', async () => {
  const name = document.getElementById('input-child-name').value.trim();
  if (!name) { showToast('請輸入寶貝的名字 🌸'); return; }
  if (!state.childDob) { showToast('請選擇寶貝的出生日期 🎂'); return; }
  const ok = await createChild(name, state.childDob);
  if (ok) {
    showScreen('screen-main');
    initMain();
  }
});

document.getElementById('btn-go-add').addEventListener('click', () => {
  resetAddForm();
  showScreen('screen-add');
});

document.getElementById('btn-settings').addEventListener('click', () => {
  if (confirm(`寶貝：${state.childName}\n\n要清除本機資料並重新設定嗎？\n（雲端資料仍保留）`)) {
    localStorage.clear();
    location.reload();
  }
});

// 新增頁：返回
document.getElementById('btn-back-from-add').addEventListener('click', () => {
  showScreen('screen-main');
});

// 新增頁：類型選擇
document.querySelectorAll('.type-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    state.selectedType = card.dataset.type;
  });
});

// 新增頁：年齡選擇（多選）
document.getElementById('add-age-grid').addEventListener('click', e => {
  const chip = e.target.closest('.age-chip');
  if (!chip) return;
  chip.classList.toggle('selected');
  const age = chip.dataset.age;
  if (chip.classList.contains('selected')) {
    if (!state.selectedAge.includes(age)) state.selectedAge.push(age);
  } else {
    state.selectedAge = state.selectedAge.filter(a => a !== age);
  }
});

// 新增頁：AI 分析
document.getElementById('btn-analyze').addEventListener('click', analyzeItem);

// 新增頁：儲存
document.getElementById('btn-save-item').addEventListener('click', saveItem);

// 詳細頁：返回
document.getElementById('btn-back-from-detail').addEventListener('click', () => {
  showScreen('screen-main');
});

// Filter 篩選
document.getElementById('filter-row').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  state.filter = chip.dataset.filter;
  renderItemsList();
});

  const item = e.target.closest('.nav-item');
  if (!item) return;
  const nav = item.dataset.nav;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  item.classList.add('active');
  if (nav === 'add') {
    resetAddForm();
    showScreen('screen-add');
  }
});

});
document.getElementById('input-item-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-analyze').click();
});

init();
